<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="g" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="1"/>
      <stop offset="55%" stop-color="#6d4cc7" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1c1033" stop-opacity="1"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- cave mouth / shadow arc -->
  <circle cx="60" cy="60" r="54" fill="url(#g)"/>
  <!-- wiki/graph nodes -->
  <g filter="url(#glow)" fill="#e9d8fd" stroke="#e9d8fd" stroke-width="1.2">
    <circle cx="60" cy="32" r="4"/>
    <circle cx="34" cy="52" r="3"/>
    <circle cx="86" cy="52" r="3"/>
    <circle cx="44" cy="82" r="3"/>
    <circle cx="76" cy="82" r="3"/>
    <circle cx="60" cy="64" r="5.5"/>
  </g>
  <!-- graph edges -->
  <g stroke="#e9d8fd" stroke-width="1.1" stroke-opacity="0.85" fill="none">
    <line x1="60" y1="32" x2="60" y2="64"/>
    <line x1="34" y1="52" x2="60" y2="64"/>
    <line x1="86" y1="52" x2="60" y2="64"/>
    <line x1="44" y1="82" x2="60" y2="64"/>
    <line x1="76" y1="82" x2="60" y2="64"/>
    <line x1="34" y1="52" x2="44" y2="82" stroke-opacity="0.5"/>
    <line x1="86" y1="52" x2="76" y2="82" stroke-opacity="0.5"/>
    <line x1="60" y1="32" x2="34" y2="52" stroke-opacity="0.5"/>
    <line x1="60" y1="32" x2="86" y2="52" stroke-opacity="0.5"/>
  </g>
</svg>
